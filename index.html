<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Corvus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; font-family: monospace; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; pointer-events: none;
    }
    #score {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 2.5em; font-weight: bold; text-shadow: 0 2px 8px #000;
      letter-spacing: 2px;
    }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; text-align: center;
    }
    #overlay h1 { font-size: 3em; margin-bottom: 0.2em; letter-spacing: 3px; }
    #overlay .sub { font-size: 1.1em; color: #aaa; margin-bottom: 2em; }
    #overlay .prompt { font-size: 1.3em; color: #e0c97f; animation: pulse 1.2s infinite; }
    #overlay .final-score { font-size: 1.8em; margin-bottom: 0.5em; color: #e0c97f; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="score" style="display:none">0</div>
  <div id="overlay">
    <h1>🐦‍⬛ Flappy Corvus</h1>
    <div class="sub">tap or press space to flap</div>
    <div class="prompt">tap / space to start</div>
  </div>

  <script type="importmap">
    { "imports": { "three": "./vendor/three.module.js" } }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
